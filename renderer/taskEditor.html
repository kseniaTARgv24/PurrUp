<!-- ========================= -->
<!-- Task Editor -->
<!-- ========================= -->
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Task Editor</title>

    <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />

    <link rel="stylesheet" href="../dist/output.css">

</head>

<body class="app-window bg-cream text-ink p-6">

<!-- HEADER -->
<div class="task-header flex items-center gap-3 mb-4 bg-white/70 backdrop-blur border border-roseSoft rounded-xl p-3">
    <input class="task-name flex-1 px-3 py-1.5 rounded-md border border-roseSoft bg-white/70" placeholder="Task name" id="task-name"/>

    <div class="header-actions flex gap-2">
        <button class="compare-btn px-3 py-1.5 rounded-md bg-blush hover:bg-roseSoft" id="compare-btn">Compare</button>
        <button class="save-task-btn px-3 py-1.5 rounded-md bg-rose text-white hover:bg-roseSoft" id="save-task-btn">SAVE TASK</button>
        <button class="settings-btn px-3 py-1.5 rounded-md border border-roseSoft" id="settings-btn">
            Settings
        </button>
    </div>
</div>

<!-- SOURCE -->
<div class="path-container flex gap-4 mb-4" style="flex-direction: row">
    <div class="path-block flex-1">
        <div class="path-label text-sm font-medium mb-1" id="source-folder">Source</div>

        <div class="path-row flex gap-2">
            <input class="path-input flex-1 px-2 py-1.5 rounded-md border border-roseSoft bg-white/70" placeholder="Select source folder" />
            <button class="browse-btn px-3 rounded-md border border-roseSoft">Browse</button>
        </div>
    </div>

    <!-- TARGET -->
    <div class="path-block flex-1">
        <div class="path-label text-sm font-medium mb-1" id="target-folder">Target</div>

        <div class="path-row flex gap-2">
            <input class="path-input flex-1 px-2 py-1.5 rounded-md border border-roseSoft bg-white/70" placeholder="Select target folder" />
            <button class="browse-btn px-3 rounded-md border border-roseSoft">Browse</button>
        </div>
    </div>
</div>

<!-- FILE LISTS -->
<div class="file-area flex border border-roseSoft rounded-xl overflow-hidden bg-white/70">

    <!-- LEFT -->
    <div class="file-panel flex-1 flex flex-col">
        <div class="file-header flex justify-between px-3 py-1.5 text-xs bg-blush/40 border-b border-roseSoft">
            <span>Relative path</span>
            <span>Size</span>
        </div>

        <div class="file-list flex-1" id="source-file-list">
            <!-- left files -->
        </div>
    </div>

    <!-- ACTIONS -->
    <div class="action-panel w-16 flex items-center justify-center border-x border-roseSoft">
        <button class="action-btn px-2 py-1 rounded-md bg-blush"></button>
    </div>

    <!-- RIGHT -->
    <div class="file-panel flex-1 flex flex-col">
        <div class="file-header flex justify-between px-3 py-1.5 text-xs bg-blush/40 border-b border-roseSoft">
            <span>Relative path</span>
            <span>Size</span>
        </div>

        <div class="file-list flex-1" id="target-file-list">
            <!-- right files -->
        </div>

    </div>

</div>

<!-- STATUS -->
<div class="status-bar mt-3 px-3 py-1.5 text-xs bg-blush/30 border border-roseSoft rounded-md " id="status-bar">
    Statistics: 0 files
</div>

<div  class="delete-task mt-3 px-3 py-3 text-xs bg-blush/30 border border-roseSoft rounded-md flex flex-col items-center gap-3">

    <div id="delete-container" class="flex items-center justify-center gap-2 w-full">
        <button id="delete-task-btn"
                class="px-4 py-2 rounded-md bg-blush hover:bg-roseSoft transition">
            Delete this task
        </button>
    </div>

    <div id="delete-confirm-container" class="flex items-center justify-center gap-3 w-full hidden">
        <p class="text-center">Are you sure?</p>

        <button id="yes-delete-btn"
                class="px-4 py-2 rounded-md bg-blush hover:bg-red-500 transition">
            Yes
        </button>

        <button id="no-delete-btn"
                class="px-4 py-2 rounded-md bg-white/50 hover:bg-white transition">
            No
        </button>
    </div>

</div>

<script type="module" src="dataCollector.js"></script>
<script src="TaskEditor_ui.js"></script>
</body>
</html>
