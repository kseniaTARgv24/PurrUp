<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Filter_Sync_Sched</title>

    <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';"
    />

    <link rel="stylesheet" href="../dist/output.css">

    <link rel="stylesheet" href="Filter_Sync_Sched_style.css">

    <style>
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .tab.active {
            background: rgba(255,255,255,0.7);
        }
    </style>

</head>

<body class="bg-cream text-ink p-6 drag-enabled">

<div class="tabs flex gap-1 mb-4 bg-blush/40 p-1 rounded-xl w-fit no-drag">
    <button class="tab active px-4 py-2 rounded-lg text-sm" data-tab="filter">Filter</button>
    <button class="tab px-4 py-2 rounded-lg text-sm" data-tab="sync">Synchronization</button>
    <button class="tab px-4 py-2 rounded-lg text-sm" data-tab="schedule">Schedule</button>
</div>

<div class="tab-content bg-white/70 backdrop-blur border border-roseSoft rounded-xl p-6 space-y-6 w-[680px] no-drag">

    <div class="tab-panel active" id="filter">

        <div class="ffs-row flex gap-8">
            <div class="ffs-col flex-1">
                <div class="ffs-section-title font-semibold text-sm mb-1">Include</div>
                <textarea class="ffs-textarea w-full h-28 rounded-md border border-roseSoft bg-white/70 p-2" id="filter-include">*</textarea>
            </div>

            <div class="ffs-col flex-1">
                <div class="ffs-section-title font-semibold text-sm mb-1">Exclude</div>
                <textarea class="ffs-textarea w-full h-28 rounded-md border border-roseSoft bg-white/70 p-2" id="filter-exclude"></textarea>
            </div>
        </div>

        <div class="ffs-row flex gap-8 mt-4">
            <div class="ffs-col small">
                <div class="ffs-section-title font-semibold text-sm mb-2">File size</div>

                <div class="ffs-inline flex gap-2 items-center text-sm mb-2">
                    <span>Minimum</span>
                    <input id="size-min" type="number" value="0" min="0" max="1000000" class="w-20 px-2 py-1 rounded-md border border-roseSoft bg-white/70">
                </div>

                <div class="ffs-inline flex gap-2 items-center text-sm">
                    <span>Maximum</span>
                    <input id="size-max" type="number" value="0" min="0" max="1000000" class="w-20 px-2 py-1 rounded-md border border-roseSoft bg-white/70">
                </div>
            </div>

        </div>


    </div>

    <div class="tab-panel" id="sync">

        <div class="ffs-row flex gap-8">
            <!-- LEFT -->
            <div class="ffs-left space-y-2 w-64">
                <div class="ffs-section-title font-semibold text-sm">Select a variant:</div>

                <label class="ffs-radio flex gap-2 items-center text-sm">
                    <input type="radio" name="sync" value="two-way" checked class="accent-rose">
                    Two way
                </label>

                <label class="ffs-radio flex gap-2 items-center text-sm">
                    <input type="radio" name="sync" value="mirror" class="accent-rose">
                    Mirror
                </label>

                <label class="ffs-radio flex gap-2 items-center text-sm">
                    <input type="radio" name="sync" value="update" class="accent-rose">
                    Update
                </label>
            </div>

            <!-- RIGHT DESCRIPTION -->
            <div class="w-80 text-sm border rounded-xl p-3" id="sync-description">
                Two way sync description...
            </div>
        </div>

        <hr class="my-6">

        <div class="ffs-row flex gap-8">
            <!-- LEFT -->
            <div class="space-y-1 text-sm w-64">
                <div class="ffs-section-title font-semibold">Delete and overwrite:</div>

                <label class="flex gap-2 items-center">
                    <input type="radio" name="delete" value="recycle" checked class="accent-rose">
                    Recycle bin
                </label>

                <label class="flex gap-2 items-center">
                    <input type="radio" name="delete" value="permanent" class="accent-rose">
                    Permanent
                </label>

                <label class="flex gap-2 items-center">
                    <input type="radio" name="delete" value="versioning" class="accent-rose">
                    Versioning
                </label>
            </div>

            <!-- RIGHT DESCRIPTION -->
            <div class="w-80 text-sm border rounded-xl p-3">
                <div id="delete-description">Recycle bin description...</div>

                <div id="versioning-path-container" class="hidden mt-3">
                    <label class="block text-xs mb-1">Version folder path:</label>
                    <input
                            type="text"
                            id="version-folder-path"
                            class="w-full border border-roseSoft rounded-lg px-2 py-1"
                            placeholder="C:/Backups/Versions"
                    >
                </div>
            </div>
        </div>

    </div>

    <div class="tab-panel" id="schedule">

        <label  class="flex gap-2 items-center text-sm"><input id="schedule-enabled" type="checkbox" class="accent-rose"> Enable schedule</label> <!--todo NB!! task_active_toggle in widget = schedule enabled in task editor!!! (shortcut)-->

        <div class="ffs-row flex items-center gap-2 text-sm mt-3">
            <span>Run every</span>
            <input type="number" id="run-every-value" value="1" min="1" max="1000000" class="w-16 px-2 py-1 rounded-md border border-roseSoft bg-white/70">
            <select class="px-2 py-1 rounded-md border border-roseSoft bg-white/70" id="run-every-unit">
                <option>minutes</option>
                <option>hours</option>
                <option>days</option>
            </select>
        </div>

        <div class="ffs-row flex items-center gap-2 text-sm mt-3">
            <span>Start time</span>
            <input
                    type="datetime-local"
                    id="start-time"
                    class="px-2 py-1 rounded-md border border-roseSoft bg-white/70"
            >
        </div>

        <div class="ffs-row flex items-center gap-2 text-sm mt-3">
            <label class="flex gap-2 items-center"><input type="checkbox" class="accent-rose" id="ignore-span-enabled"> Ignore specific time span (do not bu)</label>

            <span>From </span>
            <input type="time" class="px-2 py-1 rounded-md border border-roseSoft bg-white/70" id="ignore-from">
            <span>To </span>
            <input type="time" class="px-2 py-1 rounded-md border border-roseSoft bg-white/70" id="ignore-to">
        </div>


    </div>

    <div class="ffs-footer flex items-center gap-2 mt-6">
        <button class="px-3 py-1.5 rounded-md bg-blush hover:bg-rose text-white" id="filter-default-btn">Default</button>
        <div class="ffs-spacer flex-1"></div>
        <button class="px-4 py-1.5 rounded-md bg-roseSoft hover:bg-rose text-white" id="filter-ok-btn" >OK</button>
        <button class="px-4 py-1.5 rounded-md border border-roseSoft" id="filter-cancel-btn">Cancel</button>
    </div>

</div>

<script type="module" src="dataCollector.js"></script>
<script src="FSS_ui.js"></script>

</body>
</html>
