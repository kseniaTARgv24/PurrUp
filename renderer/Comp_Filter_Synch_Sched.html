<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Comp_Filter_Synch_Sched</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme:{
                extend:{
                    colors:{
                        cream:"#fff7f5",
                        blush:"#f8dede",
                        rose:"#e9b8c4",
                        roseSoft:"#f4cfd6",
                        ink:"#5a4a4e"
                    }
                }
            }
        }

    </script>
    <style>
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .tab.active {
            background: rgba(255,255,255,0.7);
        }
    </style>
</head>

<body class="bg-cream text-ink p-6">

<div class="tabs flex gap-1 mb-4 bg-blush/40 p-1 rounded-xl w-fit">
    <button class="tab active px-4 py-2 rounded-lg text-sm" data-tab="filter">Filter</button>
    <button class="tab px-4 py-2 rounded-lg text-sm" data-tab="sync">Synchronization</button>
    <button class="tab px-4 py-2 rounded-lg text-sm" data-tab="schedule">Schedule</button>
</div>

<div class="tab-content bg-white/70 backdrop-blur border border-roseSoft rounded-xl p-6 space-y-6 w-[680px]">

    <div class="tab-panel active" id="filter">  <!--todo авто удаление лишних пробелов на конце!!!!!-->

        <div class="ffs-row flex gap-8">
            <div class="ffs-col flex-1">
                <div class="ffs-section-title font-semibold text-sm mb-1">Include</div>
                <textarea class="ffs-textarea w-full h-28 rounded-md border border-roseSoft bg-white/70 p-2">*</textarea>
            </div>

            <div class="ffs-col flex-1">
                <div class="ffs-section-title font-semibold text-sm mb-1">Exclude</div>
                <textarea class="ffs-textarea w-full h-28 rounded-md border border-roseSoft bg-white/70 p-2">
\\System Volume Information\\
\\$Recycle.Bin\\
\\RECYCLE?\\
\\Recovery\\
*thumbs.db
            </textarea>
            </div>
        </div>

        <div class="ffs-row flex gap-8 mt-4">
            <div class="ffs-col small">
                <div class="ffs-section-title font-semibold text-sm mb-2">File size</div>

                <div class="ffs-inline flex gap-2 items-center text-sm mb-2">
                    <span>Minimum</span>
                    <input type="number" value="0" class="w-20 px-2 py-1 rounded-md border border-roseSoft bg-white/70">
                </div>

                <div class="ffs-inline flex gap-2 items-center text-sm">
                    <span>Maximum</span>
                    <input type="number" value="0" class="w-20 px-2 py-1 rounded-md border border-roseSoft bg-white/70">
                </div>
            </div>

        </div>

        <div class="ffs-footer flex items-center gap-2 mt-6">
            <button class="px-3 py-1.5 rounded-md bg-blush">Default</button>
            <div class="ffs-spacer flex-1"></div>
            <button class="px-4 py-1.5 rounded-md bg-roseSoft hover:bg-rose text-white">OK</button>
            <button class="px-4 py-1.5 rounded-md border border-roseSoft">Cancel</button>
        </div>

    </div>

    <div class="tab-panel" id="sync">

        <div class="ffs-row flex gap-8">
            <div class="ffs-left space-y-2">
                <div class="ffs-section-title font-semibold text-sm">Select a variant:</div> <!--todo описание каждого метода-->

                <label class="ffs-radio flex gap-2 items-center text-sm"><input type="radio" name="sync" checked class="accent-rose"> Two way</label>
                <label class="ffs-radio flex gap-2 items-center text-sm"><input type="radio" name="sync" class="accent-rose"> Mirror</label>
                <label class="ffs-radio flex gap-2 items-center text-sm"><input type="radio" name="sync" class="accent-rose"> Update</label>
            </div>

        </div>

        <div class="ffs-divider h-px bg-roseSoft my-4"></div>

        <div class="ffs-row space-y-1 text-sm">
            <div class="ffs-section-title font-semibold">Delete and overwrite:</div> <!--todo описание каждого метода-->
            <label class="flex gap-2 items-center"><input type="radio" name="delete" checked class="accent-rose"> Recycle bin</label>
            <label class="flex gap-2 items-center"><input type="radio" name="delete" class="accent-rose"> Permanent</label>
            <label class="flex gap-2 items-center"><input type="radio" name="delete" class="accent-rose"> Versioning</label> <!--todo выбор папки!-->
        </div>

        <div class="ffs-footer flex justify-end gap-2 mt-6">
            <button class="px-4 py-1.5 rounded-md bg-roseSoft hover:bg-rose text-white">OK</button>
            <button class="px-4 py-1.5 rounded-md border border-roseSoft">Cancel</button>
        </div>

    </div>

    <div class="tab-panel" id="schedule">

        <label class="flex gap-2 items-center text-sm"><input type="checkbox" class="accent-rose"> Enable schedule</label> <!--todo NB!! task_active_toggle in widget = schedule enabled in task editor!!! (shortcut)-->

        <div class="ffs-row flex items-center gap-2 text-sm mt-3">
            <span>Run every</span>
            <input type="number" value="1" class="w-16 px-2 py-1 rounded-md border border-roseSoft bg-white/70">
            <select class="px-2 py-1 rounded-md border border-roseSoft bg-white/70">
                <option>minutes</option>
                <option>hours</option>
                <option>days</option>
            </select>
        </div>

        <div class="ffs-row flex items-center gap-2 text-sm mt-3">
            <span>Start time</span>
            <input type="time" class="px-2 py-1 rounded-md border border-roseSoft bg-white/70">  <!--todo кнопка NOW для авто выставления текущего времени-->
            <span> ... sync will start in ?? minutes</span>
        </div>

        <div class="ffs-row flex items-center gap-2 text-sm mt-3">
            <label class="flex gap-2 items-center"><input type="checkbox" class="accent-rose"> Ignore specific time span (do not bu)</label>

            <span>From </span>
            <input type="time" class="px-2 py-1 rounded-md border border-roseSoft bg-white/70">
            <span>To </span>
            <input type="time" class="px-2 py-1 rounded-md border border-roseSoft bg-white/70">
        </div>

        <div class="ffs-footer flex justify-end gap-2 mt-6">
            <button class="px-4 py-1.5 rounded-md bg-roseSoft hover:bg-rose text-white">OK</button>
            <button class="px-4 py-1.5 rounded-md border border-roseSoft">Cancel</button>
        </div>

    </div>

</div>

<script src="ui.js"></script>
</body>
</html>
